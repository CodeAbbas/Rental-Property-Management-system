<div class="min-h-screen bg-slate-50">
  <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-white/70 shadow-sm backdrop-blur-md">
    <nav class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <a routerLink="/" class="flex items-center gap-3">
        <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-950 text-sm font-bold text-white shadow-sm">
          RP
        </span>
        <span class="hidden text-base font-bold tracking-tight text-slate-950 sm:inline">
          RentalPro
        </span>
      </a>

      <div class="flex items-center gap-1 rounded-full border border-slate-200 bg-white/80 p-1 shadow-sm">
        <a routerLink="/" routerLinkActive="bg-slate-950 text-white shadow-sm" [routerLinkActiveOptions]="{ exact: true }" class="rounded-full px-3 py-2 text-sm font-semibold text-slate-600 transition-all hover:bg-slate-100 hover:text-slate-950">Home</a>
        <a routerLink="/add" routerLinkActive="bg-slate-950 text-white shadow-sm" class="rounded-full px-3 py-2 text-sm font-semibold text-slate-600 transition-all hover:bg-slate-100 hover:text-slate-950">Add</a>
        <a routerLink="/favorites" routerLinkActive="bg-slate-950 text-white shadow-sm" class="rounded-full px-3 py-2 text-sm font-semibold text-slate-600 transition-all hover:bg-slate-100 hover:text-slate-950">Favorites</a>
        <a routerLink="/analytics" routerLinkActive="bg-slate-950 text-white shadow-sm" class="rounded-full px-3 py-2 text-sm font-semibold text-slate-600 transition-all hover:bg-slate-100 hover:text-slate-950">Analytics</a>
      </div>

      <a routerLink="/login" class="hidden rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition-all hover:border-slate-950 hover:bg-slate-950 hover:text-white sm:inline-flex">
        Login
      </a>
    </nav>
  </header>

  <router-outlet></router-outlet>
</div>
