<h2>Analytics</h2>

<h3>Average Rent</h3>
<div *ngFor="let item of averageRent" style="border:1px solid #ccc; margin:10px; padding:10px;">
  <p><strong>Location:</strong> {{item._id}}</p>
  <p><strong>Average Rent:</strong> £{{item.average_price_pcm}}</p>
  <p><strong>Total Listings:</strong> {{item.total_listings_in_area}}</p>
</div>

<h3>Popular Property Types</h3>
<div *ngFor="let item of popularTypes" style="border:1px solid #ccc; margin:10px; padding:10px;">
  <p><strong>Type:</strong> {{item._id}}</p>
  <p><strong>Total:</strong> {{item.total_count}}</p>
</div>
