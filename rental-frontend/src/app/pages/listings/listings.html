<h2>Properties</h2>

<input [(ngModel)]="searchText" placeholder="Search by title, location or description">
<button (click)="search()">Search</button>

<div *ngFor="let item of listings" style="border:1px solid #ccc; margin:10px; padding:10px;">
  <h3>{{item.title}}</h3>
  <p><strong>Location:</strong> {{item.location}}</p>
  <p><strong>Price:</strong> £{{item.price_pcm}}</p>
  <button (click)="addToFav(item._id)">❤️ Favorite</button>
</div>
