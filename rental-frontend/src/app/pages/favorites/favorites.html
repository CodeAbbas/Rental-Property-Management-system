<h2 style="margin-bottom: 15px;">My Favorite Properties</h2>

<p *ngIf="favorites.length === 0">No favorites yet.</p>

<div *ngFor="let item of favorites" style="background: white; border: 1px solid #ddd; margin-bottom: 15px; padding: 15px;">
  <h3>{{item.title}}</h3>
  <p><strong>Location:</strong> {{item.location}}</p>
  <p><strong>Price:</strong> £{{item.price_pcm}}</p>
</div>
