<section class="min-h-screen bg-slate-50 px-4 py-12">
  <div class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold text-slate-950">Create Account</h2>
    <p class="mt-2 text-sm text-slate-500">Register to access protected rental features.</p>

    <div class="mt-6 space-y-4">
      <div>
        <label class="mb-1 block text-sm font-semibold text-slate-700">Username</label>
        <input
          [(ngModel)]="registerData.username"
          placeholder="Username"
          required
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10"
        >
      </div>

      <div>
        <label class="mb-1 block text-sm font-semibold text-slate-700">Password</label>
        <input
          [(ngModel)]="registerData.password"
          type="password"
          placeholder="Password"
          required
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10"
        >
      </div>

      <button
        (click)="register()"
        class="w-full rounded-xl bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800"
      >
        Register
      </button>
    </div>
  </div>
</section>
